server.port=8080
spring.application.name=lexintel-api

# JWT Configuration
jwt.secret=LexIntelAI-SuperSecret-JWT-Key-2025-Must-Be-At-Least-256-Bits-Long!
jwt.expiration-ms=86400000

# ─── PostgreSQL Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/lexintel_db
spring.datasource.username=nishantsharma
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload Configuration ───────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# H2 Console (disabled for PostgreSQL mode — enable for dev if needed)
spring.h2.console.enabled=false
