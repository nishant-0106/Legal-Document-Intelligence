server.port=8080
spring.application.name=lexintel-api

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ─── PostgreSQL Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/lexintel_db
spring.datasource.username=nishantsharma
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── File Upload Configuration ───────────────────────────────────────────────
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# H2 Console (disabled for PostgreSQL mode — enable for dev if needed)
spring.h2.console.enabled=false

# Spring AI Gemini Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.5-flash
spring.ai.google.genai.project-id=lexintel-ai
spring.ai.google.genai.embedding.project-id=lexintel-ai
spring.ai.google.genai.embedding.location=us-central1
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
spring.ai.google.genai.embedding.text.options.dimensions=768

# Spring AI pgvector Configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimension=768

