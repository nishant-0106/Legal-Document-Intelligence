server.port=8080
spring.application.name=lexintel-api

# JWT Configuration
jwt.secret=LexIntelAI-SuperSecret-JWT-Key-2025-Must-Be-At-Least-256-Bits-Long!
jwt.expiration-ms=86400000

# H2 Database (file-based, persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/lexintel-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
